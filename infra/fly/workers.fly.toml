# Fly.io config for apps/workers (scheduler + ingestion + agents). This is a
# worker process, not an HTTP service, so it runs without [http_service].
app = "firip-workers"
primary_region = "mia"

[build]
  dockerfile = "apps/workers/Dockerfile"

[env]
  ENVIRONMENT = "production"

[processes]
  worker = "python -m worker.scheduler"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
