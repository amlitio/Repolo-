# Fly.io config for apps/api. Copy to repo root as `fly.toml` (or run
# `flyctl deploy --config infra/fly/api.fly.toml --dockerfile apps/api/Dockerfile`)
# from the repo root so the build context includes packages/shared/data,
# which app/config.py reads at startup.
app = "firip-api"
primary_region = "mia" # Miami - closest Fly region to Florida at time of writing

[build]
  dockerfile = "apps/api/Dockerfile"

[env]
  ENVIRONMENT = "production"
  PORT = "8080"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  timeout = "5s"
  path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512
